name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# User site: https://sbkoth.github.io/
# Settings → Pages → Source: Deploy from a branch → gh-pages / (root)

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: npm

      - name: Print Node / npm versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Export static content
        run: npm run export:content

      - name: Typecheck
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Build client for user GitHub Pages (base /)
        env:
          VITE_BASE: /
        run: npx vite build

      - name: Ensure .nojekyll for Pages asset paths
        run: touch dist/public/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/public
          force_orphan: true
          enable_jekyll: false

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export static content
        run: npm run export:content

      - name: Typecheck
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Build client for GitHub Pages
        env:
          VITE_BASE: /sbkoth-intro-page/
        run: npx vite build

      - name: Ensure .nojekyll for Pages asset paths
        run: touch dist/public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

      # Fallback branch publish so classic Pages (gh-pages) also works
      - name: Publish gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/public
          force_orphan: true
          enable_jekyll: false

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Ensure GitHub Pages site exists (Actions source)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            async function ensurePages() {
              try {
                await github.rest.repos.getPages({ owner, repo });
                console.log('Pages site already configured');
                try {
                  await github.request('PUT /repos/{owner}/{repo}/pages', {
                    owner,
                    repo,
                    build_type: 'workflow',
                  });
                  console.log('Updated Pages build_type to workflow');
                } catch (e) {
                  console.log('Pages update skipped:', e.status, e.message);
                }
                return;
              } catch (e) {
                if (e.status !== 404) {
                  console.log('getPages error:', e.status, e.message);
                }
              }
              try {
                await github.rest.repos.createPagesSite({
                  owner,
                  repo,
                  build_type: 'workflow',
                });
                console.log('Created Pages site with build_type=workflow');
                return;
              } catch (e) {
                console.log('createPagesSite(workflow) failed:', e.status, e.message);
              }
              try {
                await github.rest.repos.createPagesSite({
                  owner,
                  repo,
                  source: { branch: 'gh-pages', path: '/' },
                });
                console.log('Created Pages site from gh-pages branch');
              } catch (e) {
                console.log('createPagesSite(branch) failed:', e.status, e.message);
              }
            }
            await ensurePages();

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
